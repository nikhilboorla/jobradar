const gc = (t,m) => { for(const [k,v] of Object.entries(m)) if(t?.includes(k)) return v; return "#475569"; };
const gbi = b => { for(const [k,v] of Object.entries(BENEFIT_ICONS)) if(b?.includes(k)) return v; return "✨"; };

const buildUrl = (job) => {
  const raw = (job.applyUrl||"").trim();
  const t = encodeURIComponent(`${job.title} ${job.company}`);
  const src = (job.source||"").toLowerCase();
  const bad = !raw||raw==="null"||raw==="#"
    ||/^https?:\/\/(www\.)?(linkedin\.com\/jobs\/?$|linkedin\.com\/jobs\/search)/i.test(raw)
    ||/^https?:\/\/(www\.)?indeed\.com\/?(\?.*)?$/i.test(raw)
    ||/^https?:\/\/(www\.)?dice\.com\/?(\?.*)?$/i.test(raw)
    ||/^https?:\/\/(www\.)?glassdoor\.com\/?(\?.*)?$/i.test(raw)
    ||/^https?:\/\/(www\.)?ziprecruiter\.com\/?(\?.*)?$/i.test(raw);
  if(!bad) return raw;
  if(src.includes("linkedin"))     return `https://www.linkedin.com/jobs/search/?keywords=${t}&location=Dallas%2C+TX&f_TPR=r2592000&f_JT=F`;
  if(src.includes("dice"))         return `https://www.dice.com/jobs?q=${t}&location=75234&employment=FULLTIME`;
  if(src.includes("glassdoor"))    return `https://www.glassdoor.com/Job/jobs.htm?sc.keyword=${t}&locT=C&locId=1139977&jobType=fulltime`;
  if(src.includes("ziprecruiter")) return `https://www.ziprecruiter.com/jobs-search?search=${t}&location=Dallas%2C+TX&employment_type=full_time`;
  if(src.includes("builtin"))      return `https://builtin.com/jobs/dev-engineering/data?search=${encodeURIComponent(job.title)}`;
  return `https://www.indeed.com/jobs?q=${t}&l=Dallas%2C+TX+75234&fromage=14&jt=fulltime`;
};

const extractJobs = (buf) => {
  const jobs=[]; let d=0,s=-1;
  for(let i=0;i<buf.length;i++){
    if(buf[i]==="{"){if(d===0)s=i;d++;}
    else if(buf[i]==="}"){d--;if(d===0&&s!==-1){try{const o=JSON.parse(buf.slice(s,i+1));if(o.title&&o.company)jobs.push(o);}catch{}s=-1;}}
  }
  return jobs;
};

// ─── SEARCH TAB ───────────────────────────────────────────────────────────────
function SearchTab({savedIds,appliedIds,onSave,onTrack}) {
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [scanStep,setScanStep]=useState(0);
  const [error,setError]=useState(null);
  const [searched,setSearched]=useState(false);
  const [expandedId,setExpandedId]=useState(null);
  const [remote,setRemote]=useState("all");
  const [sort,setSort]=useState("recent");
  const [progress,setProgress]=useState(0);
  const seen=useRef(new Set());
  const scanRef=useRef(null);
  const progRef=useRef(null);

  useEffect(()=>{
    if(loading){
      setScanStep(0);let s=0;
      scanRef.current=setInterval(()=>{s=(s+1)%SCAN_STEPS.length;setScanStep(s);},1400);
      let p=0; progRef.current=setInterval(()=>{p=Math.min(p+Math.random()*4,88);setProgress(p);},300);
    } else { clearInterval(scanRef.current);clearInterval(progRef.current);if(searched)setProgress(100); }
    return()=>{clearInterval(scanRef.current);clearInterval(progRef.current);};
  },[loading]);

  const search=async()=>{
    setLoading(true);setError(null);setJobs([]);setSearched(true);setProgress(0);seen.current.clear();
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,stream:true,system:JOB_SEARCH_PROMPT,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:"Find H1B-sponsoring FULL-TIME AI Data Engineer jobs near Dallas TX 75234. Run all 8 searches. No contract/W2/temp. Sort by most recent. EXACT direct URLs with job IDs. Return only JSON array."}]})});
      if(!res.ok) throw new Error(`API error ${res.status}`);
      const reader=res.body.getReader();const dec=new TextDecoder();let buf="";
      while(true){
        const{done,value}=await reader.read();if(done)break;
        for(const line of dec.decode(value,{stream:true}).split("
")){
          if(!line.startsWith("data: "))continue;
          const d=line.slice(6).trim();if(d==="[DONE]")continue;
          try{const e=JSON.parse(d);if(e.type==="content_block_delta"&&e.delta?.type==="text_delta"){buf+=e.delta.text;const found=extractJobs(buf).filter(j=>!seen.current.has(j.id??j.title+j.company));if(found.length){found.forEach(j=>seen.current.add(j.id??j.title+j.company));setJobs(p=>[...p,...found].sort((a,b)=>(a.postedScore??30)-(b.postedScore??30)));}}
          }catch{}
        }
      }
      const m=buf.match(/\[[\s\S]*\]/);if(m){try{const a=JSON.parse(m[0]);if(Array.isArray(a)&&a.length)setJobs(a.sort((a,b)=>(a.postedScore??30)-(b.postedScore??30)));}catch{}}
    }catch(e){setError(e.message);}finally{setLoading(false);}
  };

  const displayed=jobs.filter(j=>remote==="all"?true:remote==="remote"?j.remote:!j.remote).sort((a,b)=>sort==="salary"?(parseInt((b.salary||"0").replace(/[^0-9]/g,""))||0)-(parseInt((a.salary||"0").replace(/[^0-9]/g,""))||0):(a.postedScore??30)-(b.postedScore??30));

  return(
    <div>
      {/* Search panel */}
      <div style={{background:"linear-gradient(135deg,#09162b,#070f1e)",border:"1px solid rgba(6,182,212,.15)",borderRadius:15,padding:"18px 22px",marginBottom:18}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr)) auto",gap:10,alignItems:"end",marginBottom:loading?12:0}}>
          {[{l:"ROLE",v:"Data Engineer / AI Engineer",e:"💼"},{l:"LOCATION",v:"75234 Dallas + Remote",e:"📍"},{l:"TYPE",v:"Full-Time Permanent",e:"✅"},{l:"VISA",v:"H1B Sponsorship",e:"🛂"}].map((f,i)=>(
            <div key={i}>
              <div style={{fontSize:9,color:"#1e3a5f",fontFamily:"'Space Mono'",letterSpacing:"1px",marginBottom:5}}>{f.l}</div>
              <div style={{background:"rgba(6,182,212,.04)",border:"1px solid rgba(6,182,212,.1)",borderRadius:8,padding:"7px 11px",fontSize:11,color:"#7c95b4",display:"flex",alignItems:"center",gap:6,fontWeight:500}}><span>{f.e}</span>{f.v}</div>
            </div>
          ))}
          <button onClick={search} disabled={loading} style={{background:loading?"#0d1e35":"linear-gradient(135deg,#06b6d4,#7c3aed)",border:"none",borderRadius:10,padding:"8px 18px",color:loading?"#1e3a5f":"#fff",fontWeight:700,fontSize:13,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:7,fontFamily:"inherit",whiteSpace:"nowrap",boxShadow:loading?"none":"0 0 18px rgba(6,182,212,.22)"}}>
            {loading?<><span style={{width:13,height:13,border:"2px solid #1e3a5f",borderTopColor:"#06b6d4",borderRadius:"50%",animation:"spin 1s linear infinite",display:"inline-block"}}/>Scanning...</>:<>🔍 Find Jobs</>}
          </button>
        </div>
        {loading&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"rgba(6,182,212,.05)",borderRadius:8,border:"1px solid rgba(6,182,212,.1)",animation:"slideIn .3s ease"}}>
            <span>{SCAN_STEPS[scanStep].icon}</span>
            <span style={{fontSize:11,fontFamily:"'Space Mono'",color:"#06b6d4"}}>Scanning <strong>{SCAN_STEPS[scanStep].src}</strong></span>
            {jobs.length>0&&<span style={{marginLeft:"auto",fontSize:10,padding:"1px 8px",borderRadius:20,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.3)",color:"#34d399",fontWeight:700}}>{jobs.length} found</span>}
          </div>
        )}
      </div>

      {/* Progress */}
      {(loading||(searched&&jobs.length>0))&&<div style={{height:2,background:"#0a1628",marginBottom:16,borderRadius:1}}><div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#06b6d4,#a78bfa)",transition:"width .4s ease",boxShadow:"0 0 6px rgba(6,182,212,.5)"}}/></div>}

      {error&&<div style={{background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:"10px 14px",color:"#f87171",fontSize:12.5,marginBottom:14}}>⚠️ {error}</div>}

      {/* Stats */}
      {jobs.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:16}}>
          {[{l:"Jobs Found",v:jobs.length,c:"#34d399",e:"💼"},{l:"Remote",v:jobs.filter(j=>j.remote).length,c:"#06b6d4",e:"🌐"},{l:"H1B Ready",v:jobs.length,c:"#a78bfa",e:"🛂"},{l:"With Salary",v:jobs.filter(j=>j.salary&&j.salary!=="Not Listed").length,c:"#f472b6",e:"💰"}].map((s,i)=>(
            <div key={i} style={{background:"#060e1c",border:"1px solid rgba(255,255,255,.05)",borderRadius:10,padding:"10px 12px",animation:"fadeUp .3s ease both",animationDelay:`${i*.05}s`}}>
              <div style={{fontSize:16,marginBottom:3}}>{s.e}</div>
              <div style={{fontSize:20,fontWeight:700,color:s.c,fontFamily:"'Space Mono'",lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:10,color:"#334155",marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
      )}

      {/* Filters */}
      {jobs.length>0&&(

// ─── SALARY TAB ───────────────────────────────────────────────────────────────
function SalaryTab() {
  const [role,setRole]=useState("Senior Data Engineer");
  const [custom,setCustom]=useState("");
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);

  const search=async()=>{
    const target=custom.trim()||role;
    setLoading(true);setError(null);setData(null);
    try{
      const prompt=SALARY_PROMPT.replace(/\[ROLE\]/g,target).replace("[COMPANY_TYPE]","enterprise startup mid-size");
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,system:prompt,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:`Find current 2025 salary data for "${target}" in Dallas TX. Search levels.fyi, Glassdoor, LinkedIn, Indeed. Return only the JSON object.`}]})});
      if(!res.ok) throw new Error(`API error ${res.status}`);
      const d=await res.json();
      const raw=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=raw.match(/\{[\s\S]*\}/);
      if(!m) throw new Error("Could not parse salary data.");
      setData(JSON.parse(m[0]));
    }catch(e){setError(e.message);}finally{setLoading(false);}
  };

  const LEVEL_COLORS=["#60a5fa","#34d399","#f59e0b","#f472b6"];

  return(
    <div>
      {/* Search */}
      <div style={{background:"linear-gradient(135deg,#09162b,#070f1e)",border:"1px solid rgba(6,182,212,.15)",borderRadius:14,padding:"18px 22px",marginBottom:18}}>
        <p style={{margin:"0 0 12px",fontSize:11,color:"#475569",fontFamily:"'Space Mono'"}}>RESEARCH SALARY FOR ROLE</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:9,color:"#1e3a5f",fontFamily:"'Space Mono'",letterSpacing:"1px",marginBottom:5}}>PRESET ROLES</div>
            <select value={role} onChange={e=>{setRole(e.target.value);setCustom("");}} style={{width:"100%",background:"rgba(6,182,212,.04)",border:"1px solid rgba(6,182,212,.1)",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#94a3b8",fontFamily:"inherit",cursor:"pointer"}}>
              {SALARY_ROLES.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:9,color:"#1e3a5f",fontFamily:"'Space Mono'",letterSpacing:"1px",marginBottom:5}}>OR CUSTOM ROLE</div>
            <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="e.g. AI Data Platform Engineer" style={{width:"100%",background:"rgba(6,182,212,.04)",border:"1px solid rgba(6,182,212,.1)",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#94a3b8",fontFamily:"inherit",boxSizing:"border-box"}}/>
          </div>
          <button onClick={search} disabled={loading} style={{background:loading?"#0d1e35":"linear-gradient(135deg,#06b6d4,#7c3aed)",border:"none",borderRadius:10,padding:"8px 18px",color:loading?"#1e3a5f":"#fff",fontWeight:700,fontSize:13,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",whiteSpace:"nowrap",boxShadow:loading?"none":"0 0 16px rgba(6,182,212,.2)",display:"flex",alignItems:"center",gap:7}}>
            {loading?<><span style={{width:13,height:13,border:"2px solid #1e3a5f",borderTopColor:"#06b6d4",borderRadius:"50%",animation:"spin 1s linear infinite",display:"inline-block"}}/>Researching...</>:<>💰 Get Salaries</>}
          </button>
        </div>
      </div>

      {error&&<div style={{background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:"10px 14px",color:"#f87171",fontSize:12.5,marginBottom:14}}>⚠️ {error}</div>}

      {loading&&(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{fontSize:36,marginBottom:12,animation:"pulse 1.5s ease-in-out infinite"}}>💰</div>
          <p style={{fontFamily:"'Space Mono'",fontSize:12,color:"#06b6d4"}}>Scanning Levels.fyi · Glassdoor · LinkedIn · Indeed...</p>

      {data&&(

            </div>
          )}

          {data.sources?.length>0&&<p style={{fontSize:10,color:"#1e3a5f",margin:"4px 0 0",fontFamily:"'Space Mono'"}}>Sources: {data.sources.join(" · ")}</p>}
        </div>
      )}

      {!data&&!loading&&!error&&(
        <div style={{textAlign:"center",padding:"48px 0",color:"#334155"}}>
          <div style={{fontSize:40,marginBottom:10}}>💰</div>
          <p style={{fontSize:13,color:"#475569"}}>Select a role above and click <strong style={{color:"#06b6d4"}}>Get Salaries</strong></p>
          <p style={{fontSize:11,color:"#334155",marginTop:4}}>Pulls live data from Levels.fyi · Glassdoor · LinkedIn · Indeed</p>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function JobRadarPro() {
  const [tab,setTab]=useState("search");
  const [saved,setSaved]=useState([]);
  const [apps,setApps]=useState([]);

  // Load from storage on mount
  useEffect(()=>{
    (async()=>{
      const s=await store.get("jr_saved"); if(s) setSaved(s);
      const a=await store.get("jr_apps");  if(a) setApps(a);
    })();
  },[]);

  const savedIds=new Set(saved.map(j=>String(j.id??j.title+j.company)));
  const appliedIds=new Set(apps.map(j=>String(j.id??j.title+j.company)));

  const saveJob=async(job)=>{
    const key=String(job.id??job.title+job.company);
    if(savedIds.has(key)){const next=saved.filter(j=>String(j.id??j.title+j.company)!==key);setSaved(next);await store.set("jr_saved",next);}
    else{const next=[...saved,job];setSaved(next);await store.set("jr_saved",next);}
  };

  const trackApp=async(job)=>{
    const key=String(job.id??job.title+job.company);
    if(appliedIds.has(key)) return;
    const app={...job,status:"Applied",appliedDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),notes:""};
    const next=[...apps,app]; setApps(next); await store.set("jr_apps",next);
    setTab("tracker");
  };

  const updateApp=async(app,changes)=>{
    const next=apps.map(a=>a===app?{...a,...changes}:a); setApps(next); await store.set("jr_apps",next);
  };

  const removeApp=async(app)=>{
    const next=apps.filter(a=>a!==app); setApps(next); await store.set("jr_apps",next);
  };

  const removeSaved=async(job)=>{
    const next=saved.filter(j=>j!==job); setSaved(next); await store.set("jr_saved",next);
  };

  const TABS=[
    {id:"search",  label:"Job Search",   emoji:"🔍", count:null},
    {id:"saved",   label:"Saved",        emoji:"🔖", count:saved.length},
    {id:"tracker", label:"Applications", emoji:"📊", count:apps.length},
    {id:"salary",  label:"Salary Intel", emoji:"💰", count:null},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#030810",color:"#e2e8f0",fontFamily:"'DM Sans',sans-serif",overflowX:"hidden"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        *{box-sizing:border-box}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        .card{animation:fadeUp .3s ease both;transition:transform .15s,box-shadow .15s}
        .card:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.5)!important}
        .apply-btn{transition:all .15s}
        .apply-btn:hover{filter:brightness(1.15);transform:scale(1.03)}
        .shimmer{background:linear-gradient(90deg,#0a1628 25%,#112240 50%,#0a1628 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
        .grid-bg{background-image:linear-gradient(rgba(6,182,212,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.025) 1px,transparent 1px);background-size:44px 44px}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#030810}::-webkit-scrollbar-thumb{background:#1a3a5c;border-radius:3px}
        select option{background:#0a1628}
        input::placeholder,textarea::placeholder{color:#334155}
      `}</style>

      {/* HEADER */}
      <div className="grid-bg" style={{borderBottom:"1px solid rgba(6,182,212,.1)",background:"linear-gradient(180deg,#07101f,transparent)",padding:"16px 20px 14px"}}>
        <div style={{maxWidth:1060,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#06b6d4,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:"0 0 16px rgba(6,182,212,.4)"}}>⚡</div>
            <div>
              <div style={{fontSize:16,fontWeight:700,letterSpacing:"-.4px",background:"linear-gradient(120deg,#f1f5f9,#06b6d4 55%,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.2}}>
                JobRadar Pro <span style={{fontFamily:"'Space Mono'",fontSize:9.5,WebkitTextFillColor:"#334155"}}>H1B · AI · DALLAS</span>
              </div>
              <div style={{fontSize:9,color:"#1e3a5f",fontFamily:"'Space Mono'",letterSpacing:".5px",marginTop:1}}>NIKHIL BOORLA · FULL-TIME ONLY · RECENT FIRST</div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {["🚫 No Citizenship","🚫 No Contract","✅ H1B til Jul'27","✅ $150K+ Target"].map((b,i)=>(
              <span key={i} style={{fontSize:9,padding:"2px 7px",borderRadius:20,fontWeight:600,background:b.startsWith("✅")?"rgba(52,211,153,.07)":"rgba(248,113,113,.07)",border:`1px solid ${b.startsWith("✅")?"rgba(52,211,153,.18)":"rgba(248,113,113,.15)"}`,color:b.startsWith("✅")?"#34d399":"#f87171"}}>{b}</span>
            ))}
          </div>
        </div>
      </div>

      {/* NAV TABS */}
      <div style={{borderBottom:"1px solid rgba(255,255,255,.05)",background:"#050c18",padding:"0 20px"}}>
        <div style={{maxWidth:1060,margin:"0 auto",display:"flex",gap:2}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"#06b6d4":"transparent"}`,color:tab===t.id?"#06b6d4":"#475569",padding:"12px 16px",fontSize:12.5,fontWeight:tab===t.id?700:500,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,transition:"all .15s",whiteSpace:"nowrap"}}>
              {t.emoji} {t.label}
              {t.count!=null&&t.count>0&&<span style={{background:tab===t.id?"#06b6d4":"rgba(255,255,255,.08)",color:tab===t.id?"#000":"#475569",borderRadius:20,padding:"0 6px",fontSize:10,fontWeight:700}}>{t.count}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1060,margin:"0 auto",padding:"20px 18px"}}>
        {tab==="search"  && <SearchTab savedIds={savedIds} appliedIds={appliedIds} onSave={saveJob} onTrack={trackApp}/>}
        {tab==="saved"   && <SavedTab saved={saved} onRemove={removeSaved} onTrack={trackApp}/>}
        {tab==="tracker" && <TrackerTab apps={apps} onUpdate={updateApp} onRemove={removeApp}/>}
        {tab==="salary"  && <SalaryTab/>}
      </div>

      <div style={{maxWidth:1060,margin:"0 auto",padding:"0 18px 20px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,borderTop:"1px solid rgba(255,255,255,.03)",paddingTop:14,marginTop:8}}>
        <span style={{fontSize:9,color:"#0d2137",fontFamily:"'Space Mono'"}}>JOBRADAR PRO · NIKHIL BOORLA · H1B · DALLAS 75234 · 2025</span>
        <span style={{fontSize:9,color:"#081524"}}>Powered by Claude AI + Live Web Search</span>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<JobRadarPro/>);
  </script>
</body>
</html>
